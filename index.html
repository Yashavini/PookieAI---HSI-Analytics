<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSI Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <style>
        :root { --bg: #000; --side-bg: #0a0a0a; --accent: #d4af37; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* Instagram-style Navigation Sidebar */
        .nav-sidebar {
            width: 80px; background: var(--bg); border-right: 1px solid #1a1a1a;
            display: flex; flex-direction: column; align-items: center; padding: 40px 0; gap: 40px;
        }
        .nav-item { color: #444; font-size: 28px; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .nav-item:hover, .nav-item.active { color: var(--accent); transform: scale(1.2); }

        /* Main Screen Manager */
        .viewport { flex: 1; position: relative; display: flex; }
        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; background: var(--bg); padding: 40px; box-sizing: border-box; }
        .screen.active { display: flex; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Elegant Components */
        .luxury-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 20px; padding: 30px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-family: 'Playfair Display'; font-size: 2rem; color: var(--accent); margin: 0 0 10px 0; }
        .tagline { font-size: 0.7rem; letter-spacing: 4px; color: #666; text-transform: uppercase; margin-bottom: 30px; }

        /* Chat UI (Home Screen) */
        #chat-window { flex: 1; overflow-y: auto; padding-bottom: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 15px; border-radius: 15px; font-size: 0.9rem; border: 1px solid #222; }
        .ai-msg { align-self: flex-start; border-left: 3px solid var(--accent); background: #080808; }
        .user-msg { align-self: flex-end; background: #111; }

        .input-group { display: flex; gap: 15px; padding-top: 20px; border-top: 1px solid #1a1a1a; }
        input { flex: 1; background: #0a0a0a; border: 1px solid #222; padding: 15px; color: #fff; border-radius: 10px; outline: none; }
        button { background: var(--accent); color: #000; border: none; padding: 0 30px; border-radius: 10px; font-weight: 600; cursor: pointer; }

        /* Stats & Images */
        .viz-img { width: 100%; max-height: 400px; object-fit: contain; border-radius: 15px; border: 1px solid #222; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    </style>
</head>
<body>

    <nav class="nav-sidebar">
        <div class="nav-item active" onclick="showScreen('home', this)"><ion-icon name="home-outline"></ion-icon></div>
        <div class="nav-item" onclick="showScreen('analytics', this)"><ion-icon name="analytics-outline"></ion-icon></div>
        <div class="nav-item" onclick="showScreen('data', this)"><ion-icon name="cube-outline"></ion-icon></div>
        <div class="nav-item" onclick="showScreen('profile', this)"><ion-icon name="person-outline"></ion-icon></div>
    </nav>

    <div class="viewport">
        <div id="home" class="screen active">
            <h1>Pookie AI</h1>
            <div class="tagline">Intelligence for Indian Pines</div>
            <div id="chat-window">
                <div class="msg ai-msg">Welcome back, Babe. I'am PookieAi, Ready to analyze the HSI cube? </div>
            </div>
            <div class="input-group">
                <input type="text" id="userInput" placeholder="Ask Pookie anything...">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>

        <div id="analytics" class="screen">
            <h1>Spectral Insights</h1>
            <div class="tagline">Real-time Spectral Fingerprint</div>
            <div class="luxury-card" id="graph-container">
                <p style="color:#666">Loading luxury analytics...</p>
            </div>
            <div class="stat-grid">
                <div class="luxury-card">
                    <div style="color:var(--accent); font-size: 0.7rem;">ACCURACY</div>
                    <div style="font-size: 1.8rem;">96.82%</div>
                </div>
                <div class="luxury-card">
                    <div style="color:var(--accent); font-size: 0.7rem;">KAPPA</div>
                    <div style="font-size: 1.8rem;">0.971</div>
                </div>
            </div>
        </div>

        <div id="data" class="screen">
            <h1>HSI Visualization</h1>
            <div class="tagline">Indian Pines Cube (RGB Preview)</div>
            <div class="luxury-card" id="image-container">
                <p style="color:#666">Connecting to dataset...</p>
            </div>
        </div>
    </div>

    <script>
        function showScreen(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(id === 'analytics' || id === 'data') loadVisuals();
        }

        async function loadVisuals() {
            try {
                const rgbRes = await fetch('http://127.0.0.1:5000/api/visualize/rgb');
                const rgbData = await rgbRes.json();
                document.getElementById('image-container').innerHTML = `<img src="data:image/png;base64,${rgbData.image}" class="viz-img">`;

                const specRes = await fetch('http://127.0.0.1:5000/api/visualize/spectral');
                const specData = await specRes.json();
                document.getElementById('graph-container').innerHTML = `<img src="data:image/png;base64,${specData.graph}" class="viz-img">`;
            } catch (e) { console.log("System offline."); }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat-window');
            if (!input.value) return;
            const text = input.value;
            chat.innerHTML += `<div class="msg user-msg">${text}</div>`;
            input.value = '';
            
            const res = await fetch('http://127.0.0.1:5000/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: text })
            });
            const data = await res.json();
            chat.innerHTML += `<div class="msg ai-msg">${data.answer}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
